<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dr. MAS 테스트</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .chat-box { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 75%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 20%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #eef; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="chat-box">
    <h2>🩺 Dr. MAS AI 테스트</h2>
    <input type="text" id="symptom" placeholder="어디가 아프신가요?">
    <button onclick="sendChat()">전송</button>
    <div id="result">여기에 결과가 표시됩니다.</div>
</div>
<script>
    async function sendChat() {
        const symptomText = document.getElementById('symptom').value;
        const resultDiv = document.getElementById('result');
        resultDiv.innerText = "분석 중입니다... ⏳";

        try {
            const response = await fetch('http://localhost:3000/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: 1, symptomText: symptomText })
            });
            const data = await response.json();
            if(data.success) {
                resultDiv.innerHTML = `<strong>질환:</strong> ${data.data.predictedDisease}<br><br><strong>안내:</strong> ${data.data.guide}`;
            } else { resultDiv.innerText = "오류: " + data.message; }
        } catch (e) { resultDiv.innerText = "서버 연결 실패!"; }
    }
</script>
</body>
</html>
